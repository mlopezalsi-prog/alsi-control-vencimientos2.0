<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AL Control de Vencimientos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
/* === RECUPERACION ESTRUCTURAL VISTAS === */
function toast(msg,type='ok'){
  const old=document.querySelector('.toast'); if(old)old.remove();
  const el=document.createElement('div'); el.className='toast '+type; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),4200);
}
function bucketName(b){return b==='personas'?'Personal':b==='empresas'?'Empresas':b==='vehiculos'?'Vehículos':b==='bajasEnviadas'?'Bajas enviadas':b==='telegramas'?'Telegramas':b}
function safeReqs(r){
  const docs={};
  if(r&&r.docs&&typeof r.docs==='object'&&!Array.isArray(r.docs))Object.assign(docs,r.docs);
  if(r&&r.raw&&r.raw.docs&&typeof r.raw.docs==='object'&&!Array.isArray(r.raw.docs))Object.assign(docs,r.raw.docs);
  if(r&&r.raw&&Array.isArray(r.raw.requisitos)){
    r.raw.requisitos.forEach(x=>{if(x&&x.requisito)docs[x.requisito]={fecha:x.vencimiento||'',carga:x.fechaCarga||'',obs:x.observacion||'',file:x.archivo||null}});
  }
  return docs;
}
function safeFecha(v){return typeof v==='object'?(v.fecha||v.vencimiento||v.valor||''):(v||'')}
function safeCarga(v){return typeof v==='object'?(v.carga||v.fechaCarga||v.fecha_carga||'') : ''}
function setSafeReqs(r,docs){r.docs=docs;r.raw=r.raw||{};r.raw.docs=docs}
function safeStatus(f){
  const nf=norm(f);
  if(nf==='NA'||nf==='N/A')return '<span class="pill gray">N/A</span>';
  if(nf.includes('HABILITADO'))return '<span class="pill green">Habilitado</span>';
  return semaforo(f);
}
function safeDocState(f){
  const nf=norm(f);
  if(!f||nf==='NA'||nf==='N/A'||nf.includes('HABILITADO'))return 'sinfecha';
  return docState(f);
}
function recordStatus(r){
  const vals=Object.values(safeReqs(r));
  if(!vals.length)return '<span class="pill gray">Sin requisitos</span>';
  let best=null, hab=0;
  vals.forEach(v=>{
    const f=safeFecha(v), nf=norm(f);
    if(nf.includes('HABILITADO')){hab++;return}
    const d=diffDays(f);
    if(d!==null&&(best===null||d<best.d))best={f,d};
  });
  if(best)return semaforo(best.f);
  if(hab)return '<span class="pill green">Habilitado</span>';
  return '<span class="pill gray">Sin fecha</span>';
}
function reqSummary(r){
  const entries=Object.entries(safeReqs(r));
  if(!entries.length)return '<span class="pill gray">Sin requisitos</span>';
  let v=0,c=0,p=0,g=0,s=0,h=0,na=0;
  entries.forEach(([_,val])=>{
    const f=safeFecha(val), nf=norm(f), st=safeDocState(f);
    if(nf==='NA'||nf==='N/A'){na++;return}
    if(nf.includes('HABILITADO')){h++;return}
    if(st==='vencido')v++; else if(st==='critico')c++; else if(st==='proximo')p++; else if(st==='vigente')g++; else s++;
  });
  return '<div class="docs-pills">'+
  (v?'<span class="pill red">'+v+' vencidos</span>':'')+
  (c?'<span class="pill red">'+c+' críticos</span>':'')+
  (p?'<span class="pill yellow">'+p+' próximos</span>':'')+
  (g?'<span class="pill green">'+g+' vigentes</span>':'')+
  (h?'<span class="pill green">'+h+' habilitados</span>':'')+
  (s?'<span class="pill gray">'+s+' sin fecha</span>':'')+
  (na?'<span class="pill gray">'+na+' N/A</span>':'')+
  '</div>';
}
function allDashboardDocs(){
  const out=[];
  ['personas','empresas','vehiculos'].forEach(bucket=>{
    visibleRecords(bucket).forEach(r=>{
      Object.entries(safeReqs(r)).forEach(([req,v])=>{
        const f=safeFecha(v), nf=norm(f);
        if(nf.includes('HABILITADO'))return;
        out.push({bucket,r,req,f,d:diffDays(f),state:safeDocState(f)});
      });
    });
  });
  return out;
}
function stableSetView(v){
  if(['calendario','notificaciones'].includes(v))return;
  state.view=v||'dashboard';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===state.view));
  stableRender();
  saveSession&&saveSession();
}
function setView(v){stableSetView(v)}
function stableRender(){
  if(!state.loaded)return;
  const v=state.view||'dashboard';
  if(v==='dashboard')return renderDashboard();
  if(v==='personas')return renderBucketStable('personas');
  if(v==='empresas')return renderBucketStable('empresas');
  if(v==='vehiculos')return renderBucketStable('vehiculos');
  if(v==='bajasEnviadas'||v==='bajas')return renderBajasEnviadasStable();
  if(v==='bajasPlanta')return renderBajasPlantaStable();
  if(v==='telegramas')return renderTelegramasStable();
  if(v==='consultas')return renderConsultasStable();
  if(v==='reportes')return renderReportesStable();
  if(v==='configuracion')return renderConfiguracion?renderConfiguracion():renderReportesStable();
  return renderDashboard();
}
function render(){return stableRender()}
function renderDashboard(){
  $('pageTitle').textContent='Panel de control';
  $('pageSub').textContent='Vencimientos de todas tus obras';
  const docs=allDashboardDocs();
  const counts={vencido:0,critico:0,proximo:0,vigente:0,sinfecha:0};
  docs.forEach(x=>counts[x.state]=(counts[x.state]||0)+1);
  $('view').innerHTML='<div class="cards">'+
    kpi('🔴','Vencidos',counts.vencido||0,'Ver detalle')+
    kpi('🟠','Críticos 0-7 días',counts.critico||0,'Ver detalle')+
    kpi('🟡','Próximos 8-12 días',counts.proximo||0,'Ver detalle')+
    kpi('🟢','Vigentes',counts.vigente||0,'Ver detalle')+
    '</div><div class="cards">'+
    kpi('👤','Personal',visibleRecords('personas').length,'')+
    kpi('🏢','Empresas',visibleRecords('empresas').length,'')+
    kpi('🚚','Vehículos',visibleRecords('vehiculos').length,'')+
    kpi('⚪','Sin fecha',counts.sinfecha||0,'')+
    '</div>'+
    '<div class="panel"><div class="panel-head"><div><h3>Vencimientos y requerimientos ('+docs.length+')</h3><p class="muted" style="margin:4px 0 0">Tipo, registro, obra, requisito, vencimiento, estado y acción.</p></div><div class="toolbar"><button class="filter-chip active" data-dash-filter="todos">Todos</button><button class="filter-chip" data-dash-filter="vencido">Vencidos</button><button class="filter-chip" data-dash-filter="critico">Críticos</button><button class="filter-chip" data-dash-filter="proximo">Próximos</button><button class="filter-chip" data-dash-filter="vigente">Vigentes</button></div></div><div class="table-wrap"><table><thead><tr><th>Tipo</th><th>Registro</th><th>Obra</th><th>Requisito</th><th>Vencimiento</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="dashRows"></tbody></table></div></div>';
  document.querySelectorAll('[data-dash-filter]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-dash-filter]').forEach(x=>x.classList.remove('active'));b.classList.add('active');drawDashRows(b.dataset.dashFilter)});
  drawDashRows('todos');
}
function drawDashRows(filter){
  let docs=allDashboardDocs();
  if(filter&&filter!=='todos')docs=docs.filter(x=>x.state===filter);
  docs.sort((a,b)=>(a.d??99999)-(b.d??99999));
  $('dashRows').innerHTML=docs.slice(0,160).map(x=>'<tr><td>'+bucketName(x.bucket)+'</td><td><b>'+esc(x.r.identifier||x.r.display_name||'')+'</b><br><span class="muted">'+esc(x.r.display_name||x.r.company||'')+'</span></td><td>'+esc(workOf(x.r)||'')+'</td><td>'+esc(x.req)+'</td><td>'+esc(x.f||'')+'</td><td>'+safeStatus(x.f)+'</td><td>'+actions(x.r.id)+'</td></tr>').join('')||'<tr><td colspan="7" class="empty">Sin vencimientos para mostrar.</td></tr>';
}
function renderBucketStable(bucket){
  const title=bucketName(bucket);
  $('pageTitle').textContent=title;
  $('pageSub').textContent='Registros y requerimientos';
  $('view').innerHTML='<div class="panel"><div class="panel-head"><h3>'+title+'</h3><div class="toolbar"><input id="q" class="input" style="width:260px" placeholder="Buscar..."><button class="btn primary" data-new="'+bucket+'">+ Nuevo</button></div></div><div class="table-wrap"><table><thead><tr><th>Identificador</th><th>Nombre</th><th>Obra</th><th>Requisitos</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="rows"></tbody></table></div></div>';
  $('q').oninput=()=>drawBucketStable(bucket);
  drawBucketStable(bucket);
}
function drawBucketStable(bucket){
  let rows=visibleRecords(bucket);
  const q=norm($('q')?.value||'');
  if(q)rows=rows.filter(r=>norm([r.identifier,r.display_name,r.company,workOf(r)].join(' ')).includes(q));
  $('rows').innerHTML=rows.map(r=>'<tr><td><b>'+esc(r.identifier||'')+'</b></td><td>'+esc(r.display_name||r.company||'')+'</td><td>'+esc(workOf(r)||'')+'</td><td>'+reqSummary(r)+'</td><td>'+recordStatus(r)+'</td><td>'+actions(r.id)+'</td></tr>').join('')||'<tr><td colspan="6" class="empty">Sin datos.</td></tr>';
}
function renderBajasEnviadasStable(){
  $('pageTitle').textContent='Bajas enviadas';
  $('pageSub').textContent='Gestión administrativa principal';
  let rows=bajasEnviadasRecords();
  const wf=$('workFilter')?.value; if(wf&&wf!=='TODAS')rows=rows.filter(r=>recordMatchesWork?recordMatchesWork(r,wf):workOf(r)===wf);
  $('view').innerHTML='<div class="panel"><div class="panel-head"><div><h3>📨 Bajas enviadas</h3><p class="muted" style="margin:4px 0 0">Al marcar Telegrama enviado, Firmó todo o Todo OK, pasa a Baja de planta.</p></div><div class="toolbar"><input id="bajaQ" class="input" style="width:240px" placeholder="Buscar..."></div></div><div class="table-wrap"><table><thead><tr><th>Legajo</th><th>Nombre</th><th>Obra</th><th>Fecha baja</th><th>Movimiento</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="bajaRows"></tbody></table></div></div>';
  $('bajaQ').oninput=drawBajasRowsStable;
  drawBajasRowsStable();
}
function drawBajasRowsStable(){
  let rows=bajasEnviadasRecords();
  const wf=$('workFilter')?.value; if(wf&&wf!=='TODAS')rows=rows.filter(r=>recordMatchesWork?recordMatchesWork(r,wf):workOf(r)===wf);
  const q=norm($('bajaQ')?.value||''); if(q)rows=rows.filter(r=>norm([r.identifier,r.display_name,workOf(r),JSON.stringify(r.raw||{})].join(' ')).includes(q));
  $('bajaRows').innerHTML=rows.map(r=>'<tr><td><b>'+esc(r.identifier||'')+'</b></td><td>'+esc(r.display_name||'')+'</td><td>'+esc(workOf(r)||'')+'</td><td>'+esc((r.raw&&r.raw.fechaBaja)||'')+'</td><td>'+esc((r.raw&&r.raw.movimiento)||'')+'</td><td>'+bajaEstadoPill(r)+'</td><td>'+bajaActions(r.id)+'</td></tr>').join('')||'<tr><td colspan="7" class="empty">Sin bajas enviadas.</td></tr>';
}
function renderBajasPlantaStable(){
  $('pageTitle').textContent='Bajas de planta';
  $('pageSub').textContent='Vista automática derivada de Bajas enviadas';
  let rows=bajasPlantaRecords();
  const wf=$('workFilter')?.value; if(wf&&wf!=='TODAS')rows=rows.filter(r=>recordMatchesWork?recordMatchesWork(r,wf):workOf(r)===wf);
  $('view').innerHTML='<div class="panel"><div class="panel-head"><h3>⛔ Bajas de planta</h3></div><div class="table-wrap"><table><thead><tr><th>Legajo</th><th>Nombre</th><th>Obra</th><th>Fecha baja</th><th>Estado</th><th>Origen</th></tr></thead><tbody>'+ (rows.map(r=>'<tr><td><b>'+esc(r.identifier||'')+'</b></td><td>'+esc(r.display_name||'')+'</td><td>'+esc(workOf(r)||'')+'</td><td>'+esc((r.raw&&r.raw.fechaBaja)||'')+'</td><td>'+bajaEstadoPill(r)+'</td><td><span class="pill gray">Bajas enviadas</span></td></tr>').join('')||'<tr><td colspan="6" class="empty">Sin bajas de planta.</td></tr>') +'</tbody></table></div></div>';
}
function renderTelegramasStable(){
  $('pageTitle').textContent='Telegramas';
  $('pageSub').textContent='Telegramas vinculados por legajo';
  let rows=visibleRecords('telegramas');
  $('view').innerHTML='<div class="panel"><div class="panel-head"><h3>✈️ Telegramas</h3><div class="toolbar"><input id="telQ" class="input" style="width:240px" placeholder="Buscar..."></div></div><div class="table-wrap"><table><thead><tr><th>Legajo</th><th>Nombre</th><th>Obra</th><th>Fecha</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="telRows"></tbody></table></div></div>';
  $('telQ').oninput=()=>drawTelegramasStable();
  drawTelegramasStable();
}
function drawTelegramasStable(){
  let rows=visibleRecords('telegramas');
  const q=norm($('telQ')?.value||''); if(q)rows=rows.filter(r=>norm([r.identifier,r.display_name,workOf(r),JSON.stringify(r.raw||{})].join(' ')).includes(q));
  $('telRows').innerHTML=rows.map(r=>'<tr><td><b>'+esc(r.identifier||'')+'</b></td><td>'+esc(r.display_name||'')+'</td><td>'+esc(workOf(r)||'')+'</td><td>'+esc((r.raw&&r.raw.fecha)||'')+'</td><td><span class="pill gray">'+esc((r.raw&&r.raw.estado)||'Registrado')+'</span></td><td>'+actions(r.id)+'</td></tr>').join('')||'<tr><td colspan="6" class="empty">Sin telegramas.</td></tr>';
}
function renderConsultasStable(){
  $('pageTitle').textContent='Consultas';
  $('pageSub').textContent='Consulta integral de legajo';
  $('view').innerHTML='<div class="panel"><div class="panel-head"><div class="search-row"><div class="field"><label>Legajo</label><input id="consultaLegajo" class="input" placeholder="Escribí un legajo..."></div><button class="btn primary" id="consultaBtn">Consultar</button></div></div><div class="modal-body"><div id="consultaBox" class="consult-result empty">Ingresá un legajo para consultar.</div></div></div>';
  $('consultaBtn').onclick=()=>drawConsultaStable($('consultaLegajo').value);
  $('consultaLegajo').addEventListener('keydown',e=>{if(e.key==='Enter')drawConsultaStable($('consultaLegajo').value)});
}
function drawConsultaStable(legajo){
  legajo=String(legajo||'').trim();
  const l=norm(legajo);
  const pers=state.records.filter(r=>r.bucket==='personas'&&norm(r.identifier)===l&&canSee(r));
  const bajas=bajasEnviadasRecords().filter(r=>norm(r.identifier)===l);
  const tels=visibleRecords('telegramas').filter(r=>norm(r.identifier)===l);
  const persona=pers[0];
  const docs=[]; pers.forEach(r=>Object.entries(safeReqs(r)).forEach(([req,v])=>docs.push({r,req,f:safeFecha(v)})));
  const obras=[...new Set(pers.map(workOf).concat(bajas.map(workOf)).concat(tels.map(workOf)).filter(Boolean))];
  $('consultaBox').innerHTML='<div class="ficha-grid"><div><div class="ficha-card"><h4>Datos del legajo</h4><div class="data-list"><div class="data-line"><span>Legajo</span><b>'+esc(legajo)+'</b></div><div class="data-line"><span>Nombre</span><b>'+esc((persona&&persona.display_name)||(bajas[0]&&bajas[0].display_name)||'Sin dato')+'</b></div><div class="data-line"><span>Empresa</span><b>'+esc((persona&&persona.company)||'Sin dato')+'</b></div><div class="data-line"><span>Estado</span><b>'+(bajas.filter(isBajaConfirmada).length?'<span class="pill red">Baja de planta</span>':(persona?recordStatus(persona):'<span class="pill gray">Sin personal</span>'))+'</b></div></div></div><div class="ficha-card"><h4>Obras</h4>'+(obras.map(o=>'<div class="mini-item"><b>'+esc(o)+'</b></div>').join('')||'<div class="muted">Sin obras.</div>')+'</div></div><div><div class="ficha-card"><h4>Documentos</h4>'+(docs.map(d=>'<div class="mini-item"><b>'+esc(d.req)+'</b><span>'+esc(workOf(d.r))+' · '+esc(d.f||'Sin fecha')+' · '+safeStatus(d.f)+'</span></div>').join('')||'<div class="muted">Sin documentos.</div>')+'</div><div class="ficha-card"><h4>Bajas</h4>'+(bajas.map(b=>'<div class="mini-item"><b>'+esc(b.display_name||'')+'</b><span>'+esc(workOf(b))+' · '+esc((b.raw&&b.raw.fechaBaja)||'')+' · '+bajaEstadoPill(b)+'</span></div>').join('')||'<div class="muted">Sin bajas.</div>')+'</div><div class="ficha-card"><h4>Telegramas</h4>'+(tels.map(t=>'<div class="mini-item"><b>'+esc(t.display_name||'')+'</b><span>'+esc(workOf(t))+' · '+esc((t.raw&&t.raw.fecha)||'')+'</span></div>').join('')||'<div class="muted">Sin telegramas.</div>')+'</div></div></div>';
}
function renderReportesStable(){
  $('pageTitle').textContent='Reportes';
  $('pageSub').textContent='Indicadores por obra';
  const docs=allDashboardDocs();
  const bajas=bajasEnviadasRecords(), planta=bajasPlantaRecords();
  $('view').innerHTML='<div class="report-grid"><div class="report-card"><b>📅 Vencimientos</b><span class="muted">'+docs.length+' documentos/requisitos</span></div><div class="report-card"><b>👤 Personal</b><span class="muted">'+visibleRecords('personas').length+' legajos</span></div><div class="report-card"><b>🏢 Empresas</b><span class="muted">'+visibleRecords('empresas').length+' empresas</span></div><div class="report-card"><b>🚚 Vehículos</b><span class="muted">'+visibleRecords('vehiculos').length+' vehículos</span></div><div class="report-card"><b>📨 Bajas enviadas</b><span class="muted">'+bajas.length+' bajas</span></div><div class="report-card"><b>⛔ Bajas de planta</b><span class="muted">'+planta.length+' bloqueos</span></div></div>';
}
function openRecord(id){
 const r=state.records.find(x=>x.id===id); if(!r)return;
 const tipo=bucketName(r.bucket);
 $('modalTitle').textContent=tipo+' · '+(r.identifier||r.display_name||'');
 $('modalBody').innerHTML='<div class="ficha-card"><h4>Datos principales</h4><div class="data-list"><div class="data-line"><span>Identificador</span><b>'+esc(r.identifier||'')+'</b></div><div class="data-line"><span>Nombre</span><b>'+esc(r.display_name||r.company||'')+'</b></div><div class="data-line"><span>Empresa</span><b>'+esc(r.company||'')+'</b></div><div class="data-line"><span>Obra</span><b>'+esc(workOf(r)||'')+'</b></div><div class="data-line"><span>Estado</span><b>'+recordStatus(r)+'</b></div></div></div><div class="ficha-card"><div class="req-editor-head"><div><h4>Requisitos / documentación</h4><div class="muted">Editá vencimiento y fecha de carga.</div></div><button class="btn primary" id="addReq">+ Agregar</button></div><div class="table-wrap req-editor-table"><table><thead><tr><th>Requisito</th><th>Fecha vencimiento</th><th>Fecha carga</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="reqEditRows">'+Object.entries(safeReqs(r)).map(([req,v])=>reqEditRow(req,v)).join('')+'</tbody></table></div><div style="margin-top:12px"><button class="btn primary" id="saveReqs">Guardar cambios</button></div></div>';
 $('modal').classList.remove('hidden');
 bindReqEditor(r.id);
}
function reqEditRow(req,v){
 const f=safeFecha(v), c=safeCarga(v);
 return '<tr data-req-edit><td><input class="input req-name" value="'+esc(req||'')+'"></td><td><input class="input req-date" type="date" value="'+esc(parseAnyDate(f)||'')+'"></td><td><input class="input req-load" type="date" value="'+esc(parseAnyDate(c)||'')+'"></td><td class="req-status-cell">'+safeStatus(f)+'</td><td><div class="req-editor-actions"><button class="icon-btn" data-refresh-req>🔄</button><button class="icon-btn" data-remove-req>🗑️</button></div></td></tr>';
}
function bindReqEditor(id){
 const r=state.records.find(x=>x.id===id); const body=$('reqEditRows');
 $('addReq').onclick=()=>body.insertAdjacentHTML('beforeend',reqEditRow('',{}));
 body.onclick=e=>{const rem=e.target.closest('[data-remove-req]');if(rem){rem.closest('tr').remove();return}const ref=e.target.closest('[data-refresh-req]');if(ref){const tr=ref.closest('tr');tr.querySelector('.req-status-cell').innerHTML=safeStatus(tr.querySelector('.req-date').value)}};
 body.onchange=e=>{const tr=e.target.closest('[data-req-edit]');if(tr)tr.querySelector('.req-status-cell').innerHTML=safeStatus(tr.querySelector('.req-date').value)};
 $('saveReqs').onclick=()=>{const docs={};body.querySelectorAll('[data-req-edit]').forEach(tr=>{const name=tr.querySelector('.req-name').value.trim();if(name)docs[name]={fecha:tr.querySelector('.req-date').value,carga:tr.querySelector('.req-load').value,obs:'',file:null}});setSafeReqs(r,docs);toast('Requisitos guardados.','ok');openRecord(id);stableRender();};
}
function confirmImportLocal(){
  if(!importState.normalized){alert('Primero cargá un archivo válido.');return;}
  const n=importState.normalized;
  state.records=recordsFromNormalized(n);
  state.works=n.obras||[];
  bajasEnviadasRecords().forEach(updatePersonalEstadoPorBaja);
  importState.confirmed=true;
  const store=getConfigStore();
  (n.obras||[]).forEach(w=>{if(!store[w])store[w]=cloneConfig(DEFAULT_CONFIG);});
  setConfigStore(store);
  toast('✅ Importación finalizada correctamente. Datos cargados en esta sesión.','ok');
  state.view='dashboard';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view==='dashboard'));
  stableRender();
}
document.addEventListener('DOMContentLoaded',()=>{
  setTimeout(()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.onclick=()=>{
      if(b.id==='nav-calendario'||b.dataset.view==='calendario'){const cal=$('calendar');cal&&cal.classList.toggle('open');return;}
      if(b.id==='nav-notificaciones'||b.dataset.view==='notificaciones'){const nc=$('notificationCenter');nc&&nc.classList.toggle('open');return;}
      stableSetView(b.dataset.view);
    });
  },0);
});

.login{
  background:
    radial-gradient(circle at 18% 16%, rgba(0,89,184,.35), transparent 28%),
    radial-gradient(circle at 86% 18%, rgba(0,31,77,.22), transparent 28%),
    linear-gradient(135deg,#f8fbff 0%,#eaf3ff 52%,#f7fafc 100%)!important;
}
.login::after{content:"AL Control";color:rgba(0,31,77,.06)!important;letter-spacing:-.06em}
.login-card{
  width:min(480px,100%)!important;
  border-radius:28px!important;
  box-shadow:0 34px 110px rgba(0,31,77,.22)!important;
}
.login-card .logo{
  width:180px!important;
  height:88px!important;
  margin:0 auto 8px!important;
}
.login-card h1{
  text-align:center;
  margin:6px 0 4px!important;
  color:var(--al-navy);
  font-size:30px;
  letter-spacing:-.03em;
}
.login-card h1::after{
  content:"AL Control de Vencimientos";
  display:block;
  font-size:15px;
  color:#31577f;
  font-weight:800;
  letter-spacing:0;
  margin-top:4px;
}
.login-card .muted{text-align:center}
.app{
  grid-template-columns:272px 1fr!important;
  background:
    radial-gradient(circle at 100% 0%, rgba(0,89,184,.09), transparent 32%),
    linear-gradient(180deg,#f7fbff 0%,#f2f6fb 100%)!important;
}
aside{
  background:
    linear-gradient(180deg,rgba(0,31,77,.98),rgba(0,48,106,.98)),
    linear-gradient(135deg,rgba(255,255,255,.06),transparent)!important;
  color:white!important;
  border-right:0!important;
  box-shadow:10px 0 34px rgba(0,31,77,.20)!important;
  padding:18px 14px!important;
}
aside::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.03) 1px, transparent 1px);
  background-size:42px 42px;
  opacity:.42;
  pointer-events:none;
}
.brand{
  position:relative;
  z-index:1;
  display:grid!important;
  justify-items:center;
  text-align:center;
  gap:6px!important;
  padding:12px 8px 20px!important;
  border-bottom:1px solid rgba(255,255,255,.15)!important;
}
.brand .logo{
  width:190px!important;
  height:94px!important;
}
.brand b{
  font-size:19px!important;
  color:white!important;
}
.brand b::after{
  content:"AL Control de Vencimientos";
  display:block;
  font-size:13px;
  font-weight:800;
  color:rgba(255,255,255,.86);
  margin-top:6px;
}
.brand .muted{display:none}
.side-filter{
  position:relative;
  z-index:1;
  background:rgba(255,255,255,.09)!important;
  border:1px solid rgba(255,255,255,.18)!important;
  color:white;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);
}
.side-filter label,.side-title{color:rgba(255,255,255,.70)!important}
.side-filter select{
  background:rgba(255,255,255,.96)!important;
  color:#071b3a!important;
}
.nav-btn{
  position:relative;
  z-index:1;
  color:rgba(255,255,255,.90)!important;
  border-color:transparent!important;
  padding:12px 12px!important;
  border-radius:14px!important;
  overflow:hidden;
}
.nav-btn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,rgba(255,255,255,.16),rgba(255,255,255,.04));
  opacity:0;
  transition:opacity .18s ease;
}
.nav-btn:hover{
  background:rgba(255,255,255,.10)!important;
  transform:translateX(4px) scale(1.01)!important;
  border-color:rgba(255,255,255,.16)!important;
}
.nav-btn:hover::before{opacity:1}
.nav-btn.active{
  background:linear-gradient(135deg,#0059b8,#003f88)!important;
  color:#fff!important;
  border-color:rgba(255,255,255,.22)!important;
  box-shadow:0 12px 30px rgba(0,0,0,.22), inset 0 0 0 1px rgba(255,255,255,.12);
}
.top{
  min-height:84px!important;
  background:rgba(255,255,255,.88)!important;
  border-bottom:1px solid rgba(0,31,77,.10)!important;
  box-shadow:0 8px 24px rgba(0,31,77,.06);
}
.top h2{
  color:var(--al-navy);
  font-size:28px!important;
}
.top h2::before{
  content:"";
  display:inline-block;
  width:38px;
  height:26px;

.top-user{
  border-color:#d9e7f7!important;
  box-shadow:0 12px 32px rgba(0,31,77,.10)!important;
}
.btn,.icon-btn,.filter-chip,.consult-card,.card{
  will-change:transform;
}
.btn:active,.icon-btn:active,.nav-btn:active,.card:active{
  transform:scale(.98)!important;
}
.btn.primary{
  background:linear-gradient(135deg,#0059b8,#003f88)!important;
  border-color:#0059b8!important;
  box-shadow:0 12px 26px rgba(0,89,184,.22);
}
.btn.danger{
  background:#fff0f1!important;
  border-color:#ffd1d6!important;
  color:#c1121f!important;
}
.card{
  border-radius:22px!important;
  border:1px solid #dce8f6!important;
  box-shadow:0 12px 34px rgba(0,31,77,.08)!important;
  background:rgba(255,255,255,.94)!important;
}
.card:hover{
  transform:translateY(-4px)!important;
  box-shadow:0 20px 46px rgba(0,31,77,.14)!important;
}
.kpi-num{
  color:#001f4d;
  letter-spacing:-.04em;
}
.panel{
  border-radius:22px!important;
  border-color:#dce8f6!important;
  box-shadow:0 12px 34px rgba(0,31,77,.07)!important;
}
.panel-head{
  background:linear-gradient(180deg,#ffffff,#f7fbff)!important;
}
table th{
  color:#29496f!important;
  background:#f6faff!important;
}
tbody tr:hover{
  background:#f7fbff!important;
}
.icon-btn{
  border-color:#d8e7f8!important;
  color:#003b7a!important;
  background:#fff!important;
}
.icon-btn:hover{
  transform:translateY(-2px) rotate(-1deg)!important;
  border-color:#8bb9ee!important;
  box-shadow:0 10px 22px rgba(0,31,77,.15)!important;
}
.icon-actions .icon-btn:nth-child(1)::after{content:"";}
.calendar,.notify-panel{
  border-color:#d8e7f8!important;
  box-shadow:0 22px 70px rgba(0,31,77,.18)!important;
}
#calendarToggle{
  background:linear-gradient(135deg,#0059b8,#003f88)!important;
  border-color:rgba(255,255,255,.20)!important;
  box-shadow:0 18px 44px rgba(0,89,184,.32)!important;
}
#calendarToggle:hover{
  transform:translateY(-4px) rotate(3deg)!important;
}
.modal-card{
  border:1px solid #d8e7f8!important;
  box-shadow:0 34px 110px rgba(0,31,77,.26)!important;
}
.pill.red,.tag.red,.red{background:#fff0f1!important;color:#c1121f!important;border-color:#ffcdd3!important}
.pill.orange,.tag.orange,.orange{background:#fff5ed!important;color:#c2410c!important;border-color:#fed7aa!important}
.pill.yellow,.tag.yellow,.yellow{background:#fff9e8!important;color:#a16207!important;border-color:#fde68a!important}
.pill.green,.tag.green,.green{background:#edfdf3!important;color:#047857!important;border-color:#bbf7d0!important}
.pill.gray,.tag.gray,.gray{background:#eef3f8!important;color:#475569!important;border-color:#d6e0eb!important}
.consult-card:hover,.consult-card.active{
  border-color:#8bb9ee!important;
  background:#f7fbff!important;
}
@media(max-width:980px){
  .app{grid-template-columns:1fr!important}
  aside{height:auto!important;position:relative!important}
  .brand{display:flex!important;justify-content:flex-start;text-align:left}
  .brand .logo{width:110px!important;height:56px!important}
}
@media(max-width:720px){
  .top h2::before{display:none}
  .login-card .logo{width:150px!important;height:72px!important}
  .app aside{padding:12px!important}
}


/* === AJUSTE FINAL: LOGO GRANDE + VISTA 85 + MENU COMO REFERENCIA === */
:root{
  --ui-scale:.85;
}

/* Escala visual tipo zoom-out sin romper responsive */
@media(min-width:981px){
  .content{
    padding:18px 22px 90px!important;
  }
  .card{
    padding:14px!important;
  }
  .kpi-num{
    font-size:30px!important;
  }
  .panel-head{
    padding:13px 16px!important;
  }
  th{
    padding:10px 12px!important;
    font-size:10px!important;
  }
  td{
    padding:10px 12px!important;
    font-size:13px!important;
  }
  .btn{
    padding:8px 11px!important;
    font-size:13px!important;
  }
  .input,select,textarea{
    padding:8px 10px!important;
    font-size:13px!important;
  }
  .cards{
    gap:12px!important;
    margin-bottom:14px!important;
  }
}

/* Sidebar más parecido a la referencia */
.app{
  grid-template-columns:236px 1fr!important;
}
aside{
  padding:12px 10px!important;
}
.brand{
  padding:10px 4px 16px!important;
  margin-bottom:12px!important;
}
.brand .logo{
  width:200px!important;
  height:120px!important;
  margin:0 auto!important;
}
.brand b{
  font-size:24px!important;
  line-height:1!important;
  margin-top:2px!important;
}
.brand b::after{
  font-size:13px!important;
  line-height:1.2!important;
  margin-top:8px!important;
  white-space:normal!important;
}
.side-filter{
  padding:11px!important;
  margin-bottom:12px!important;
  border-radius:16px!important;
}
.side-title{
  margin:12px 4px 7px!important;
}
.nav-btn{
  min-height:38px!important;
  padding:9px 11px!important;
  font-size:13.5px!important;
  font-weight:900!important;
  gap:9px!important;
  margin:3px 0!important;
}
.nav-btn::first-letter{
  font-size:18px;
}
.nav-btn.active{
  box-shadow:0 10px 24px rgba(0,89,184,.28), inset 0 0 0 1px rgba(255,255,255,.14)!important;
}

/* Header: sacar mini logo desproporcionado y hacerlo más prolijo */
.top{
  min-height:74px!important;
  padding:12px 22px!important;
}
.top h2{
  font-size:25px!important;
  display:flex;
  align-items:center;
  gap:10px;
}
.top h2::before{
  width:58px!important;
  height:38px!important;

function normalizeBajaEstado(v){
  const original=String(v||'').trim();
  const n=norm(original);
  if(!n)return 'Pendiente';
  if(n.includes('REINGRESO'))return 'Reingreso';
  if(n.includes('TODO OK')||n.includes('OK'))return 'Todo OK';
  if(n.includes('FIRMO TODO')||n.includes('FIRMO')||n.includes('FIRMADO'))return 'Firmó todo';
  if(n.includes('TELEGRAMA')&&n.includes('ENVI'))return 'Telegrama enviado';
  if(n.includes('ENVIADO'))return 'Telegrama enviado';
  if(n.includes('CONFIRM'))return 'Baja confirmada';
  if(n.includes('RECIBO'))return 'Falta recibo';
  if(n.includes('NOTA'))return 'Falta nota';
  if(n.includes('INTIM'))return 'Intimación';
  if(n.includes('PEND'))return 'Pendiente';
  return original;
}
function isBajaConfirmada(r){
  const raw=(r&&r.raw)||{};
  const estado=normalizeBajaEstado(raw.estado||r.estado||'');
  const mov=norm(raw.movimiento||r.movimiento||'');
  if(estado==='Reingreso'||mov.includes('REINGRESO'))return false;
  return ['Telegrama enviado','Firmó todo','Todo OK','Baja confirmada'].includes(estado);
}
function bajasEnviadasRecords(){
  return state.records.filter(r=>{

  }).filter(canSee);
}
function bajasPlantaRecords(){
  return bajasEnviadasRecords().filter(isBajaConfirmada);
}
function bajaEstadoPill(r){
  const raw=(r&&r.raw)||{};
  const estado=normalizeBajaEstado(raw.estado||r.estado||'Pendiente');
  const cls=isBajaConfirmada(r)?'red':estado==='Reingreso'?'green':estado.includes('Falta')?'yellow':'gray';
  return '<span class="pill '+cls+'">'+esc(estado)+'</span>';
}

function parseAnyDate(v){
  if(!v)return '';

  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m)return `${m[1]}-${m[2]}-${m[3]}`;
  m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(m){
    const y=m[3].length===2?'20'+m[3]:m[3];
    return `${y}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
  }
  return '';
}
function getFirst(obj,keys){

}

function normalizeImportJson(data){
  const out={personas:[],empresas:[],vehiculos:[],bajasEnviadas:[],telegramas:[],otros:[],obras:[],warnings:[],duplicates:[]};
  if(!data || typeof data!=='object'){out.warnings.push('El archivo no tiene estructura JSON válida.');return out;}
  if(data.version==='AL_CONTROL_NORMALIZADO_V1'){
    out.personas=(data.personal||[]).map(x=>recordFromNormalizedItem(x,'personas'));
    out.empresas=(data.empresas||[]).map(x=>recordFromNormalizedItem(x,'empresas'));
    out.vehiculos=(data.vehiculos||[]).map(x=>recordFromNormalizedItem(x,'vehiculos'));
    out.bajasEnviadas=(data.bajasEnviadas||[]).map(x=>recordFromNormalizedItem(x,'bajasEnviadas'));
    out.telegramas=(data.telegramas||[]).map(x=>recordFromNormalizedItem(x,'telegramas'));
    out.obras=data.obras||Array.from(new Set([].concat(out.personas,out.empresas,out.vehiculos,out.bajasEnviadas,out.telegramas).map(workOf).filter(Boolean))).sort();
    return out;
  }
  // fallback viejo
  if(Array.isArray(data)){data.forEach(x=>out.personas.push(normalizeRecord(x,'personas')));}
  else{
    Object.keys(data).forEach(key=>{
      const arr=data[key];
      if(!Array.isArray(arr))return;
      let bucket=detectBucketName(key);
      if(!bucket){
        const sample=arr[0]||{};
        const keys=Object.keys(sample).join(' ');
        bucket=detectBucketName(keys)||'otros';
      }
      arr.forEach(item=>{
        if(bucket==='otros')out.otros.push(item);
        else out[bucket].push(normalizeRecord(item,bucket));
      });
    });
  }
  out.bajasEnviadas.forEach(r=>{r.bucket='bajasEnviadas';r.type='bajasEnviadas';r.record_type='bajasEnviadas';r.raw.estado=normalizeBajaEstado(r.raw.estado||'Pendiente');r.raw.fechaBaja=parseAnyDate(r.raw.fechaBaja||r.raw.fecha||r.raw.Fecha)||r.raw.fechaBaja||'';});
  const works=new Set();
  ['personas','empresas','vehiculos','bajasEnviadas','telegramas'].forEach(b=>out[b].forEach(r=>{const w=workOf(r);if(w)works.add(w)}));
  out.obras=Array.from(works).sort();
  return out;
}
function allDocsForDashboard(){
  const out=[];
  ['personas','empresas','vehiculos'].forEach(bucket=>{
    visibleRecords(bucket).forEach(r=>{
      const docs=getDocs?getDocs(r):(r.docs||{});
      Object.entries(docs).forEach(([req,v])=>{
        const f=typeof v==='object'?(v.fecha||v.valor||''):(v||'');
        if(norm(f).includes('HABILITADO'))return;
        out.push({bucket,r,req,f,d:diffDays(f),state:docState(f)});
      });
    });
  });
  return out;
}

function canonicalWork(v){const n=norm(v);if(n.includes('ARAUCO'))return'ARAUCO';if(n.includes('NOURYON'))return'NOURYON';if(n.includes('SWIFT'))return'SWIFT';if(n.includes('TSM'))return'TSM';if(n.includes('CENTRAL PUERTO'))return'CENTRAL PUERTO';if(n.includes('CARGILL')||n==='PPA')return'CARGILL VGG / PPA';if(n.includes('LDC')||n.includes('DREYFUS'))return'LDC LAGOS / TIMBÚES';if(n.includes('EVONIK'))return'EVONIK';if(n.includes('ACINDAR'))return'ACINDAR';if(n.includes('PAMPA'))return'PAMPA';if(n.includes('BOORT'))return'BOORTMALT';return''}

/* === ETAPA 3C: FILTRO POR OBRA CON SUBOBRAS / ALIAS === */
function workAliases(value){
  const n=norm(value);
  const out=new Set();
  if(!n)return [];
  out.add(n);
  const c=canonicalWork(value);
  if(c)out.add(norm(c));
  // Cargill / PPA / Punta Alvear
  if(n.includes('CARGILL')||n.includes('PPA')||n.includes('PUNTA ALVEAR')||n.includes('P.A')||n.includes('PA '))out.add(norm('CARGILL VGG / PPA'));
  if(n.includes('VGG'))out.add(norm('CARGILL VGG / PPA'));
  // LDC / Dreyfus / Lagos / Timbúes
  if(n.includes('LDC')||n.includes('DREYFUS')||n.includes('LAGOS')||n.includes('TIMBUES')||n.includes('TIMBUES'))out.add(norm('LDC LAGOS / TIMBÚES'));
  // Pampa
  if(n.includes('PAMPA'))out.add(norm('PAMPA'));
  if(n.includes('PAMPA ENERGIA'))out.add(norm('PAMPA'));
  // Central Puerto / Siemens
  if(n.includes('CENTRAL PUERTO')||n.includes('SIEMENS')||n.includes('CCPSL'))out.add(norm('CENTRAL PUERTO'));
  // Arauco
  if(n.includes('ARAUCO'))out.add(norm('ARAUCO'));
  // Nouryon
  if(n.includes('NOURYON'))out.add(norm('NOURYON'));
  // Swift
  if(n.includes('SWIFT'))out.add(norm('SWIFT'));
  // TSM
  if(n.includes('TSM'))out.add(norm('TSM'));
  // Acindar
  if(n.includes('ACINDAR'))out.add(norm('ACINDAR'));
  // Boortmalt
  if(n.includes('BOORT'))out.add(norm('BOORTMALT'));
  // Evonik
  if(n.includes('EVONIK'))out.add(norm('EVONIK'));
  return Array.from(out);
}

  const raw=r&&r.raw||{};
  return [
    r&&r.work,r&&r.plant,r&&r.obra,r&&r.planta,

  if(!filterWork||filterWork==='TODAS')return true;

function normalizeDocValue(v){
  if(v && typeof v==='object'){
    return {
      fecha: parseAnyDate(v.fecha||v.vencimiento||v.valor||'') || String(v.fecha||v.vencimiento||v.valor||''),
      carga: parseAnyDate(v.carga||v.fechaCarga||v.fecha_carga||'') || String(v.carga||v.fechaCarga||v.fecha_carga||''),
      obs: v.obs || v.observacion || v.observaciones || '',
      file: v.file || v.archivo || null
    };
  }
  return parseAnyDate(v) || String(v||'');
}
function getDocs(r){
  if(!r)return {};
  const out={};
  if(r.docs && typeof r.docs==='object' && !Array.isArray(r.docs)){
    Object.entries(r.docs).forEach(([k,v])=>{out[k]=normalizeDocValue(v);});
  }
  const raw=r.raw||{};
  if(raw.docs && typeof raw.docs==='object' && !Array.isArray(raw.docs)){
    Object.entries(raw.docs).forEach(([k,v])=>{out[k]=normalizeDocValue(v);});
  }
  return out;
}
function hydrateRecordDocs(r){
  if(!r)return r;
  r.docs=getDocs(r);
  return r;
}
function hydrateAllDocs(){
  state.records.forEach(hydrateRecordDocs);
}
function docFecha(v){
  return typeof v==='object' ? (v.fecha||v.valor||'') : (v||'');
}
function docCarga(v){
  return typeof v==='object' ? (v.carga||'') : '';
}
function docObs(v){
  return typeof v==='object' ? (v.obs||v.observacion||'') : '';
}
function docsCount(r){
  return Object.keys(getDocs(r)).length;
}
function docsSummary(r){
  const entries=Object.entries(getDocs(r));
  if(!entries.length)return '<span class="pill gray">Sin requisitos</span>';
  let vencidos=0,criticos=0,proximos=0,vigentes=0,sinfecha=0,na=0,habilitados=0;
  entries.forEach(([k,v])=>{
    const f=docFecha(v);
    const nf=norm(f);
    if(nf.includes('HABILITADO')){habilitados++;return;}
    const st=docState(f);
    if(st==='vencido')vencidos++;
    else if(st==='critico')criticos++;
    else if(st==='proximo')proximos++;
    else if(st==='vigente')vigentes++;
    else if(st==='na')na++;
    else sinfecha++;
  });
  return '<div class="docs-pills">'+
    (vencidos?'<span class="pill red">'+vencidos+' vencidos</span>':'')+
    (criticos?'<span class="pill red">'+criticos+' críticos</span>':'')+
    (proximos?'<span class="pill yellow">'+proximos+' próximos</span>':'')+
    (vigentes?'<span class="pill green">'+vigentes+' vigentes</span>':'')+
    (habilitados?'<span class="pill green">'+habilitados+' habilitados</span>':'')+
    (sinfecha?'<span class="pill gray">'+sinfecha+' sin fecha</span>':'')+
    (na?'<span class="pill gray">'+na+' N/A</span>':'')+
  '</div>';
}
function docsMiniTable(r){
  const entries=Object.entries(getDocs(r));
  if(!entries.length)return '<div class="empty">Este registro no tiene requisitos importados.</div>';
  return '<div class="table-wrap"><table><thead><tr><th>Requisito</th><th>Vencimiento / Valor</th><th>Fecha carga</th><th>Observación</th><th>Estado</th></tr></thead><tbody>'+
    entries.map(([req,v])=>{
      const f=docFecha(v);
      const carga=docCarga(v);
      const obs=docObs(v);
      const nf=norm(f);
      const estado=nf.includes('HABILITADO')?'<span class="pill green">Habilitado</span>':semaforo(f);
      return '<tr><td><b>'+esc(req)+'</b></td><td>'+esc(f||'')+'</td><td>'+esc(carga||'')+'</td><td>'+esc(obs||'')+'</td><td>'+estado+'</td></tr>';
    }).join('')+'</tbody></table></div>';
}

function getReqs(r){

  if(r.docs && typeof r.docs==='object' && !Array.isArray(r.docs)){
    Object.entries(r.docs).forEach(([k,v])=>out[k]=v);
  }
  if(r.raw && r.raw.docs && typeof r.raw.docs==='object' && !Array.isArray(r.raw.docs)){

}

function legajoSuggestions(term){
 const q=norm(term||'');
 let map=new Map();
 visibleRecords('personas').forEach(r=>{
  const leg=String(r.identifier||((r.raw&&r.raw.legajo)||'')).trim();
  if(!leg)return;
  const txt=norm([leg,r.display_name,r.company,workOf(r),JSON.stringify(r.raw||{})].join(' '));

  if(!map.has(norm(leg)))map.set(norm(leg),{legajo:leg,nombre:r.display_name||((r.raw&&r.raw.nombre)||''),obra:workOf(r),empresa:r.company||'',record:r});
 });
 visibleRecords('bajas').forEach(r=>{
  const leg=String(r.identifier||((r.raw&&r.raw.legajo)||'')).trim();
  if(!leg)return;
  const txt=norm([leg,r.display_name,workOf(r),JSON.stringify(r.raw||{})].join(' '));
  if(q && !txt.includes(q))return;
  const key=norm(leg);
  if(!map.has(key))map.set(key,{legajo:leg,nombre:r.display_name||((r.raw&&r.raw.nombre)||''),obra:workOf(r),empresa:'',record:r,baja:true});
  else map.get(key).baja=true;
 });
 visibleRecords('telegramas').forEach(r=>{
  const leg=String(r.identifier||((r.raw&&r.raw.legajo)||'')).trim();
  if(!leg)return;
  const txt=norm([leg,r.display_name,workOf(r),JSON.stringify(r.raw||{})].join(' '));
  if(q && !txt.includes(q))return;
  const key=norm(leg);
  if(!map.has(key))map.set(key,{legajo:leg,nombre:r.display_name||((r.raw&&r.raw.nombre)||''),obra:workOf(r),empresa:'',record:r,telegrama:true});
  else map.get(key).telegrama=true;
 });
 return Array.from(map.values()).sort((a,b)=>String(a.legajo).localeCompare(String(b.legajo),'es',{numeric:true})).slice(0,12);
}
function attachLegajoPredictive(input,opts){
 opts=opts||{}; if(!input||input.dataset.predictiveReady==='1')return; input.dataset.predictiveReady='1'; input.classList.add('predictive-input');
 let wrap=input.parentElement; if(!wrap.classList.contains('predictive-wrap')){wrap=document.createElement('div');wrap.className='predictive-wrap';input.parentNode.insertBefore(wrap,input);wrap.appendChild(input)}
 const box=document.createElement('div');box.className='predictive-box';wrap.appendChild(box);
 function close(){box.classList.remove('open')}
 function pick(item){
  input.value=item.legajo; input.dataset.selectedLegajo=item.legajo;
  if(opts.nameId && $(opts.nameId) && !$(opts.nameId).value)$(opts.nameId).value=item.nombre||'';
  if(opts.forceNameId && $(opts.forceNameId))$(opts.forceNameId).value=item.nombre||'';
  if(opts.workId && $(opts.workId) && item.obra && (!activeFilteredWork()||opts.allowWorkReplace))$(opts.workId).value=item.obra;
  close();
  if(opts.onPick)opts.onPick(item);
 }
 function draw(){
  const val=input.value.trim();
  const list=legajoSuggestions(val);
  if(!val && !opts.showOnFocus){close();return}
  box.innerHTML=list.length?list.map((it,i)=>'<button type="button" class="predictive-item" data-pick="'+i+'"><b>'+esc(it.legajo)+' · '+esc(it.nombre||'Sin nombre')+'</b><span>'+esc(it.obra||'Sin obra')+(it.baja?' · BAJA':'')+(it.telegrama?' · telegrama':'')+'</span></button>').join(''):'<div class="predictive-empty">Sin coincidencias todavía. Importá la matriz o revisá el legajo.</div>';
  box.classList.add('open');
  box.querySelectorAll('[data-pick]').forEach(btn=>btn.onclick=()=>pick(list[Number(btn.dataset.pick)]));
 }
 input.addEventListener('input',draw); input.addEventListener('focus',draw); input.addEventListener('keydown',e=>{if(e.key==='Escape')close(); if(e.key==='Enter'&&box.classList.contains('open')){const first=box.querySelector('[data-pick]'); if(first){e.preventDefault(); first.click();}}});
 document.addEventListener('click',e=>{if(!wrap.contains(e.target))close()});
 const hint=document.createElement('div');hint.className='predictive-hint';hint.textContent='Escribí el legajo y seleccioná una sugerencia de la matriz.';wrap.insertAdjacentElement('afterend',hint);
}

function handleImportFile(e){
  const file=e.target.files&&e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      importState.raw=data;
      importState.normalized=normalizeImportJson(data);
      drawImportPreview();
    }catch(err){
      const box=$('importResult');
      if(box)box.innerHTML='<div class="import-warning">No pude leer el JSON: '+esc(err.message)+'</div>';
      importState.raw=null;importState.normalized=null;if($('confirmImportBtn'))$('confirmImportBtn').disabled=true;
    }
  };
  reader.readAsText(file,'utf-8');
}
function drawImportPreview(tab){
  const n=importState.normalized;
  if(!n)return;
  const c=importCounts(n);
  const box=$('importResult');
  if(!box)return;
  const active=tab||'personas';
  const tabs=[
    ['personas','Personal',c.personas],
    ['empresas','Empresas',c.empresas],
    ['vehiculos','Vehículos',c.vehiculos],
    ['bajasEnviadas','Bajas enviadas',c.bajasEnviadas],
    ['telegramas','Telegramas',c.telegramas],
    ['obras','Obras',c.obras],
    ['duplicados','Duplicados',n.duplicates.length]
  ];
  box.innerHTML=
    '<div class="import-summary">'+
      '<div class="import-kpi"><b>'+c.personas+'</b><span>Personal</span></div>'+
      '<div class="import-kpi"><b>'+c.bajasEnviadas+'</b><span>Bajas enviadas</span></div>'+
      '<div class="import-kpi"><b>'+c.bajasPlanta+'</b><span>Bajas de planta detectadas</span></div>'+
      '<div class="import-kpi"><b>'+c.obras+'</b><span>Obras</span></div>'+
    '</div>'+
    (n.warnings.length?'<div class="import-warnings">'+n.warnings.map(w=>'<div class="import-warning">⚠️ '+esc(w)+'</div>').join('')+'</div>':'<div class="import-ok">✅ Validación inicial sin advertencias importantes.</div>')+
    '<div class="preview-tabs">'+tabs.map(t=>'<button class="preview-tab '+(active===t[0]?'active':'')+'" data-preview-tab="'+t[0]+'">'+esc(t[1])+' ('+t[2]+')</button>').join('')+'</div>'+
    '<div class="table-wrap"><table><thead>'+previewHead(active)+'</thead><tbody>'+previewRows(active,n)+'</tbody></table></div>';
  document.querySelectorAll('[data-preview-tab]').forEach(b=>b.onclick=()=>drawImportPreview(b.dataset.previewTab));

function bindConfig(work,cfg){
  document.querySelectorAll('.config-tab').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.config-tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.config-section').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const id='cfg-'+b.dataset.cfgTab;
    const sec=$(id); if(sec)sec.classList.add('active');
    const titles={obra:'Obra',semaforo:'Semáforos',personas:'Requisitos Personal',empresas:'Requisitos Empresas',vehiculos:'Requisitos Vehículos',bloqueos:'Bloqueos',contactos:'Contactos',importacion:'Importación'};
    $('cfgPanelTitle').textContent=titles[b.dataset.cfgTab]||'Configuración';
  });
  document.querySelectorAll('[data-add-req]').forEach(btn=>btn.onclick=()=>{
    const tipo=btn.dataset.addReq;
    const wrap=$('cfgReqRows-'+tipo);
    if(wrap)wrap.insertAdjacentHTML('beforeend',cfgReqRow(tipo,{nombre:'',vence:true,permiteNA:false,vigencia:''},Date.now()));
  });
  $('view').onclick=function(e){
    const del=e.target.closest('[data-del-row]');
    if(del && $('view').contains(del)){del.closest('.req-config-row,.contact-row')?.remove();return;}
  };
  const addC=$('cfgAddContact');
  if(addC)addC.onclick=()=>$('cfgContactRows').insertAdjacentHTML('beforeend',cfgContactRow({}));
  const imp=$('importFile');
  if(imp)imp.onchange=handleImportFile;
  const confirmImp=$('confirmImportBtn');
  if(confirmImp)confirmImp.onclick=confirmImportLocal;
  const clearImp=$('clearImportBtn');
  if(clearImp)clearImp.onclick=()=>{importState.raw=null;importState.normalized=null;const r=$('importResult');if(r)r.innerHTML='';if($('confirmImportBtn'))$('confirmImportBtn').disabled=true;};
  const exp=$('exportBackupBtn');
  if(exp)exp.onclick=exportLocalBackup;
  $('cfgReset').onclick=()=>{if(confirm('¿Restaurar criterios base para '+work+'?')){saveWorkConfig(work,cloneConfig(DEFAULT_CONFIG));renderConfiguracion();}};
  $('cfgSave').onclick=()=>saveConfigFromScreen(work);
}

    empresas:readReqRows('empresas'),
    vehiculos:readReqRows('vehiculos')
  };
  cfg.bloqueoBaja=!!$('cfgBloqueoBaja')?.checked;
  cfg.alertarBaja=!!$('cfgAlertarBaja')?.checked;
  cfg.mensajeBloqueo=$('cfgMsgBloqueo')?.value||'';
  cfg.contactos=readContacts();
  saveWorkConfig(work,cfg);
  alert('Configuración guardada para '+work);
  renderConfiguracion();
}

function newRecord(bucket){
 $('modalTitle').textContent=bucket==='bajas'?'Nueva baja de planta':bucket==='telegramas'?'Nuevo telegrama':'Nuevo registro';
 $('modalBody').innerHTML='<div class="form-grid"><div class="field"><label>Obra</label><select id="n_work" class="input">'+userWorks().map(w=>'<option '+(activeFilteredWork()&&norm(activeFilteredWork())===norm(w)?'selected':'')+'>'+esc(w)+'</option>').join('')+'</select></div><div class="field"><label>Legajo / identificador</label><input id="n_id" class="input"></div><div class="field full"><label>Nombre / descripción</label><input id="n_name" class="input"></div>'+(bucket==='bajas'?'<div class="field"><label>Fecha de baja</label><input id="n_fecha_baja" type="date" class="input" value="'+today()+'"></div><div class="field"><label>Estado</label><select id="n_estado" class="input"><option>Baja de planta</option><option>Falta todo</option><option>Falta recibo</option><option>Falta nota</option><option>Firmó todo</option><option>Intimación</option></select></div>':'')+'<div class="field full"><label>Observaciones</label><textarea id="n_obs" class="input"></textarea></div></div><button class="btn primary" id="createBtn">Crear</button>';
 $('createBtn').onclick=()=>{const work=$('n_work').value, leg=$('n_id').value.trim(); if(bucket==='personas'&&activeFilteredWork()&&hasBajaForWork(leg,activeFilteredWork())){alert(bajaLockMessage(leg,activeFilteredWork()));return} const raw={observaciones:$('n_obs').value}; if(bucket==='bajas'){raw.legajo=leg;raw.nombre=$('n_name').value;raw.fechaBaja=$('n_fecha_baja').value;raw.estado=$('n_estado').value;raw.obra=work} const row={id:uid(),bucket,identifier:leg,display_name:$('n_name').value,work,plant:work,company:'',docs:{},raw};state.records.push(row);closeModal();render()};
 $('modal').classList.remove('hidden');attachAllLegajoPredictives()}





function closeModal(){$('modal').classList.add('hidden')}

function dateOnly(v){
  const s=String(v||'');
  const m=s.match(/\d{4}-\d{2}-\d{2}/);
  return m?m[0]:'';
}
function eventPriority(ev){
  if(ev.kind==='vencimiento' && ev.d!==null && ev.d<=0)return 'alta';
  if(ev.kind==='baja' || ev.kind==='telegrama')return 'alta';
  if(ev.kind==='vencimiento' && ev.d!==null && ev.d<=7)return 'alta';
  if(ev.kind==='vencimiento' && ev.d!==null && ev.d<=12)return 'media';
  if(ev.kind==='medico' || ev.kind==='charla' || ev.kind==='ingreso')return 'media';
  return 'baja';
}
function eventIcon(kind){
  return {vencimiento:'🔴',medico:'🏥',charla:'📚',ingreso:'🟢',baja:'⛔',telegrama:'📨',aviso:'📄',recordatorio:'🔔'}[kind]||'📌';
}
function eventTypeClass(kind){
  return {vencimiento:'vto',medico:'medico',charla:'charla',ingreso:'ingreso',baja:'baja',telegrama:'telegrama',aviso:'aviso',recordatorio:'telegrama'}[kind]||'';
}
function agendaEvents(){
  const out=[];
  docsList().forEach(x=>{
    if(!x.f)return;
    out.push({
      id:'doc_'+x.r.id+'_'+x.req,
      kind:'vencimiento',
      date:x.f,
      title:(x.r.identifier||'')+' · '+(x.r.display_name||x.r.company||''),
      detail:x.req+' · '+workOf(x.r),
      recordId:x.r.id,
      d:x.d
    });
  });
  bajasEnviadasRecords().forEach(r=>{
    const raw=r.raw||{};
    const f=dateOnly(raw.fechaBaja||raw.fecha||raw.createdAt);
    if(f)out.push({
      id:'baja_'+r.id,
      kind:isBajaConfirmada(r)?'baja':'telegrama',
      date:f,
      title:(r.identifier||raw.legajo||'')+' · '+(r.display_name||raw.nombre||''),
      detail:(isBajaConfirmada(r)?'Baja de planta':'Baja enviada')+' · '+(raw.movimiento||'')+' · '+normalizeBajaEstado(raw.estado||''),
      recordId:r.id,
      bajaId:r.id,
      d:diffDays(f)
    });
  });
  state.records.forEach(r=>{
    const raw=r.raw||{};
    const bucket=norm(r.bucket||r.type||r.record_type||'');
    const candidates=[
      ['medico',raw.fechaMedico||raw.turnoMedico||raw.examenMedico],
      ['charla',raw.fechaCharla||raw.cbs||raw.fechaCBS||raw.induccion],
      ['ingreso',raw.fechaIngreso||raw.ingreso],
      ['aviso',raw.fechaAviso||raw.avisoObra],
      ['recordatorio',raw.fechaRecordatorio||raw.recordatorioFecha]
    ];
    candidates.forEach(([kind,val])=>{
      const f=dateOnly(val);
      if(f)out.push({
        id:kind+'_'+r.id+'_'+f,
        kind,
        date:f,
        title:(r.identifier||raw.legajo||'')+' · '+(r.display_name||raw.nombre||r.company||''),
        detail:({medico:'Examen médico',charla:'Charla / CBS / inducción',ingreso:'Ingreso programado',aviso:'Aviso de obra',recordatorio:'Recordatorio'}[kind])+' · '+workOf(r),
        recordId:r.id,
        d:diffDays(f)
      });
    });
  });
  return out.sort((a,b)=>String(a.date).localeCompare(String(b.date)) || (eventPriority(a).localeCompare(eventPriority(b))));
}
function actionableNotifications(){
  const now=new Date();now.setHours(0,0,0,0);
  return agendaEvents().filter(ev=>{
    if(ev.d===null)return false;
    if(ev.kind==='vencimiento')return ev.d<=30;
    if(['baja','telegrama','medico','charla','ingreso','aviso','recordatorio'].includes(ev.kind))return ev.d>=-7 && ev.d<=14;
    return false;
  }).sort((a,b)=>{
    const pa={alta:0,media:1,baja:2}[eventPriority(a)]??3;
    const pb={alta:0,media:1,baja:2}[eventPriority(b)]??3;
    if(pa!==pb)return pa-pb;
    return (a.d??999)-(b.d??999);
  });
}
function goToAgendaEvent(id){
  const ev=agendaEvents().find(x=>x.id===id);
  if(!ev)return;
  if(ev.bajaId)return openBaja(ev.bajaId);
  if(ev.recordId)return openRecord(ev.recordId);
}


function renderCalendar(){
  if(!state.loaded || !state.user)return;
  let cal=$('calendar');
  if(!cal){cal=document.createElement('div');cal.id='calendar';cal.className='calendar';document.body.appendChild(cal);}
  const now=new Date(), y=now.getFullYear(), m=now.getMonth(), first=new Date(y,m,1), last=new Date(y,m+1,0);
  const todayStrLocal=now.toISOString().slice(0,10);
  const month=now.toLocaleDateString('es-AR',{month:'long',year:'numeric'});
  const events=agendaEvents();
  const by={};
  events.forEach(ev=>{by[ev.date]=by[ev.date]||[];by[ev.date].push(ev);});
  let grid=['D','L','M','M','J','V','S'].map(n=>'<div class="cal-name">'+n+'</div>').join('');
  for(let i=0;i<first.getDay();i++)grid+='<div class="cal-day empty"></div>';
  for(let d=1;d<=last.getDate();d++){
    const f=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const list=by[f]||[];
    let cls='';
    if(list.length){
      const hasAlta=list.some(ev=>eventPriority(ev)==='alta');
      const hasMedia=list.some(ev=>eventPriority(ev)==='media');
      cls=hasAlta?'red':hasMedia?'yellow':'green';
    }
    grid+='<button class="cal-day '+cls+(list.length?' has-events':'')+(f===todayStrLocal?' today':'')+'" data-cal="'+f+'">'+d+(list.length?'<span class="count">'+list.length+'</span>':'')+'</button>';
  }
  cal.innerHTML='<div class="cal-head"><b>'+esc(month)+'</b><button class="btn" id="calMin" style="padding:5px 8px">−</button></div><div class="cal-body"><div class="cal-grid">'+grid+'</div><div id="calDetail" class="cal-detail"><div class="agenda-empty">Tocá un día para ver vencimientos, turnos, bajas y recordatorios.</div></div></div>';
  $('calMin').onclick=()=>cal.classList.toggle('collapsed');
  renderNotificationCenter();
  const btn=$('calendarToggle');
  const notif=actionableNotifications();
  if(btn){
    btn.dataset.count=String(notif.length);
    btn.classList.toggle('has-alerts',notif.length>0);
  }
}
function openCalDay(fecha){
  document.querySelectorAll('.cal-day').forEach(d=>d.classList.toggle('selected',d.dataset.cal===fecha));
  const list=agendaEvents().filter(x=>x.date===fecha);
  const detail=$('calDetail');
  if(!detail)return;
  detail.innerHTML=list.length?list.map(ev=>{
    const text=ev.d===null?'':(ev.d<0?'Vencido hace '+Math.abs(ev.d)+' días':ev.d===0?'Hoy':ev.d+' días');
    return '<div class="cal-item" data-agenda-event="'+esc(ev.id)+'"><span class="agenda-type '+eventTypeClass(ev.kind)+'">'+eventIcon(ev.kind)+' '+esc(ev.kind)+'</span><b>'+esc(ev.title||'Evento')+'</b><span>'+esc(ev.detail||'')+'</span><span>'+esc(fecha)+' · '+esc(text)+'</span></div>';
  }).join(''):'<div class="agenda-empty">Sin eventos para este día.</div>';
}
function renderNotificationCenter(){
  const nc=$('notificationCenter'); if(!nc||!state.loaded)return;
  const notif=actionableNotifications();
  const altas=notif.filter(x=>eventPriority(x)==='alta').length;
  const medias=notif.filter(x=>eventPriority(x)==='media').length;
  nc.innerHTML='<div class="notify-head"><div><b>🔔 Centro de notificaciones</b><div class="muted">Pendientes que requieren acción</div></div><button class="btn" class="notifyCloseBtn">×</button></div><div class="notify-body">'+
    '<div class="toolbar" style="margin-bottom:8px"><span class="pill red">'+altas+' urgentes</span><span class="pill yellow">'+medias+' próximas</span><span class="pill gray">'+notif.length+' total</span></div>'+
    (notif.slice(0,14).map(ev=>{
      const pr=eventPriority(ev);
      const txt=ev.d<0?'Vencido hace '+Math.abs(ev.d)+' días':ev.d===0?'Hoy':ev.d===1?'Mañana':ev.d+' días';
      return '<div class="notify-item" data-agenda-event="'+esc(ev.id)+'"><b><span class="notify-priority '+pr+'">'+eventIcon(ev.kind)+'</span>'+esc(ev.title||'Notificación')+'</b><span>'+esc(ev.detail||'')+'</span><span>'+esc(ev.date)+' · '+esc(txt)+'</span></div>';
    }).join('')||'<div class="agenda-empty">Sin acciones pendientes.</div>')+
    '</div>';
  const close=nc.querySelector('.notifyCloseBtn'); if(close)close.onclick=()=>nc.classList.remove('open');
}

document.addEventListener('click',e=>{const nav=e.target.closest('.nav-btn');if(nav)return setView(nav.dataset.view);const nw=e.target.closest('[data-new]');if(nw)return newRecord(nw.dataset.new);const op=e.target.closest('[data-open]');if(op)return openRecord(op.dataset.open);const del=e.target.closest('[data-delete]');if(del)return deleteRecord(del.dataset.delete);const rm=e.target.closest('[data-remove-row]');if(rm)return $(rm.dataset.removeRow)?.remove();const agenda=e.target.closest('[data-agenda-event]');if(agenda)return goToAgendaEvent(agenda.dataset.agendaEvent);const bajaOpen=e.target.closest('[data-open-baja]');if(bajaOpen)return openBaja(bajaOpen.dataset.openBaja);const bajaState=e.target.closest('[data-baja-state]');if(bajaState)return setBajaEstado(bajaState.dataset.bajaState,bajaState.dataset.state);const cal=e.target.closest('[data-cal]');if(cal)return openCalDay(cal.dataset.cal);if(e.target.closest('[data-import]'))return alert('Base limpia lista. En el próximo paso conectamos el importador de Excel/CSV o activamos carga desde Supabase.')});

 $('loginBtn').onclick=login;
