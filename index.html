/* ===== ALSI REV21 - Ajuste visual seguro SUAVE (solo estética) ===== */
:root{
  --shadow-soft:0 8px 22px rgba(15,23,42,.065);
  --row-select:#eef6ff;
  --row-hover:#f8fbff;
}
@keyframes viewSoftFade{from{opacity:.92;transform:translateY(2px)}to{opacity:1;transform:translateY(0)}}
@keyframes rowSoftSelect{from{box-shadow:inset 0 0 0 rgba(37,99,235,0)}to{box-shadow:inset 3px 0 0 rgba(37,99,235,.78)}}

.content{animation:viewSoftFade .12s ease-out both!important;}
.content.view-switching{animation:viewSoftFade .12s ease-out both!important;}
.content.view-switching>*{animation:none!important;}
.panel,.card,.final-card,.modal-card{transition:box-shadow .16s ease,border-color .16s ease,background .16s ease!important;}
.panel:hover,.card:hover{box-shadow:var(--shadow-soft);}

/* Filas: selección/hover sutil, sin saltos */
tbody tr{position:relative;transition:background .13s ease,box-shadow .13s ease!important;}
tbody tr:hover{background:var(--row-hover)!important;box-shadow:inset 3px 0 0 rgba(37,99,235,.28);}
tbody tr.alsi-row-selected{background:var(--row-select)!important;animation:rowSoftSelect .12s ease-out both;}
tbody tr.alsi-row-selected td:first-child{font-weight:950;color:#1d4ed8;}

/* Acciones: animación más profesional, sin pop fuerte */
.icon-actions{gap:7px;}
.icon-btn{transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease,background .12s ease!important;}
.icon-btn:hover{transform:translateY(-1px)!important;box-shadow:0 8px 18px rgba(15,23,42,.10)!important;z-index:2;}
.icon-btn:active{transform:translateY(0) scale(.98)!important;}
.icon-btn.view:hover,.icon-btn.edit:hover{border-color:#93c5fd;background:#eff6ff;}
.icon-btn.save:hover{border-color:#86efac;background:#ecfdf5;}
.icon-btn.delete:hover{border-color:#fecaca;background:#fff1f2;}
.btn,.nav-btn,.final-card{transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease,background .12s ease,color .12s ease!important;}
.nav-btn.active{box-shadow:inset 3px 0 0 #2563eb,0 6px 14px rgba(37,99,235,.08);}
.nav-btn:hover{transform:translateX(2px)!important;}
.final-card:hover{transform:translateY(-1px)!important;box-shadow:0 10px 24px rgba(15,23,42,.075)!important;}

/* Calendario con colores de advertencia, sin parpadeo */
.calendar{animation:viewSoftFade .12s ease-out both!important;}
.calendar .cal-day{transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease,background .12s ease!important;}
.calendar .cal-day:hover:not(.empty){transform:translateY(-1px);box-shadow:0 8px 16px rgba(15,23,42,.10);}
.calendar .cal-day.red{background:#fef2f2!important;color:#b91c1c!important;border-color:#fecaca!important;font-weight:950;}
.calendar .cal-day.yellow{background:#fffbeb!important;color:#b45309!important;border-color:#fde68a!important;font-weight:950;}
.calendar .cal-day.green{background:#ecfdf5!important;color:#047857!important;border-color:#bbf7d0!important;font-weight:950;}
.calendar .cal-day.red .count{background:#dc2626;color:white;}
.calendar .cal-day.yellow .count{background:#d97706;color:white;}
.calendar .cal-day.green .count{background:#16a34a;color:white;}
.calendar .cal-day .count{min-width:17px;height:17px;border-radius:999px;display:grid;place-items:center;right:3px;bottom:2px;font-size:9px;box-shadow:0 3px 8px rgba(15,23,42,.12);}
.cal-item{transition:background .12s ease,box-shadow .12s ease,border-color .12s ease!important;}
.cal-item:hover{box-shadow:0 6px 14px rgba(15,23,42,.07);border-color:#bfdbfe;background:#fff;}

@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important;}
}


/* REV21 calendario navegable */
.cal-item.cal-link{cursor:pointer;position:relative;}
.cal-item.cal-link:hover{border-color:#60a5fa!important;box-shadow:0 10px 24px rgba(37,99,235,.13)!important;background:#ffffff!important;}
.cal-item.cal-link::after{content:'Abrir';position:absolute;right:10px;top:10px;font-size:10px;font-weight:950;color:#2563eb;background:#eff6ff;border:1px solid #bfdbfe;border-radius:999px;padding:3px 7px;opacity:.0;transform:translateX(4px);transition:.12s ease;}
.cal-item.cal-link:hover::after{opacity:1;transform:translateX(0);}
.req-row-focus td{animation:reqFocusPulse 1.8s ease-out 1!important;border-top-color:#60a5fa!important;border-bottom-color:#60a5fa!important;background:#eff6ff!important;}
@keyframes reqFocusPulse{0%{box-shadow:0 0 0 0 rgba(37,99,235,.30)}60%{box-shadow:0 0 0 6px rgba(37,99,235,.08)}100%{box-shadow:0 0 0 0 rgba(37,99,235,0)}}
</style>

/* ===== ALSI TEST LIMPIO 15 - integración sin buckets nuevos =====
   Nota: Supabase rechaza buckets fuera del check alsi_records_bucket_check.
   Por eso Bajas de planta y Reincorporaciones se guardan con bucket='bajas'
   y se separan por raw.tipoMovimiento. */
function tipoMovimiento(r){const raw=r&&r.raw||{}; const t=raw.tipoMovimiento||raw.modulo||raw.tipo||''; const n=norm(t); if(n.includes('REINCORPOR'))return 'reincorporacion'; if(n.includes('PLANTA'))return 'baja_planta'; return (bucketOf(r)==='bajas')?'baja_general':''}
function isBajaGeneral(r){return bucketOf(r)==='bajas' && tipoMovimiento(r)==='baja_general'}
function isBajaPlanta(r){return bucketOf(r)==='bajas' && tipoMovimiento(r)==='baja_planta'}
function isReincorporacion(r){return bucketOf(r)==='bajas' && tipoMovimiento(r)==='reincorporacion'}
function movimientoOrden(tm){return tm==='reincorporacion'?3:(tm==='baja_planta'?2:(tm==='baja_general'?1:0))}
function bajaWork(r){const raw=r&&r.raw||{}; return canonicalWork([raw.ultimaObra,raw.planta,raw.obra,r.work,r.plant,r.display_name].join(' '))||recordWork(r)}
function canSeeBajaMove(r){if(isAdmin())return true; const w=bajaWork(r); return !!w && masterWorksForUser().map(norm).includes(norm(w))}
function isActiveBajaRecord(r){const leg=legajoOf(r); if(!leg)return false; let last=null; state.records.forEach(x=>{if(norm(legajoOf(x))!==norm(leg))return; const tm=tipoMovimiento(x); if(!['baja_general','baja_planta','reincorporacion'].includes(tm))return; const item={r:x,date:moveDate(x),tm,ord:movimientoOrden(tm)}; if(!last||String(item.date)>String(last.date)||(String(item.date)===String(last.date)&&item.ord>last.ord))last=item;}); return !!(last&&(last.tm==='baja_general'||last.tm==='baja_planta'))}
function allBajasGenerales(){return state.records.filter(isBajaGeneral)}
function allBajasPlanta(){let rows=state.records.filter(isBajaPlanta); const wf=$('workFilter')?$('workFilter').value:'TODAS'; if(wf&&wf!=='TODAS')rows=rows.filter(r=>norm(bajaWork(r))===norm(wf)); if(!isAdmin())rows=rows.filter(canSeeBajaMove); return rows}

function renderBajas(){$('pageTitle').textContent='Bajas';$('pageSub').textContent='Vista global: no filtra por obra'; let rows=allBajasGenerales(); const counts={};ESTADOS.forEach(e=>counts[e]=0);rows.forEach(b=>counts[canonEstado((b.raw&&b.raw.estado)||'')]++); $('view').innerHTML='<div class="final-grid">'+ESTADOS.map(e=>'<div class="final-card" data-baja="'+esc(e)+'"><div class="label">'+esc(e)+'</div><div class="num">'+(counts[e]||0)+'</div></div>').join('')+'</div><div class="panel"><div class="panel-head"><div><h3>Listado de bajas</h3><p class="muted" style="margin:4px 0 0">No usa filtro de obra. Usa búsqueda o estado.</p></div><div class="toolbar"><select id="bfEstado" class="input"><option value="">Todas</option>'+ESTADOS.map(e=>'<option>'+esc(e)+'</option>').join('')+'</select><input id="bfQ" class="input" style="width:220px" placeholder="Buscar..."><button class="btn primary" id="bfNew">➕ Nueva baja</button></div></div><div class="table-wrap"><table><thead><tr><th>Legajo</th><th>Nombre</th><th>Alcance</th><th>Movimiento</th><th>Fecha baja</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="bfRows"></tbody></table></div></div>'; $('bfEstado').addEventListener('change',drawBajas);$('bfQ').addEventListener('input',drawBajas);$('bfNew').addEventListener('click',newBaja);document.querySelectorAll('[data-baja]').forEach(c=>c.addEventListener('click',function(){$('bfEstado').value=this.dataset.baja;drawBajas()}));drawBajas()}
function drawBajas(){let rows=allBajasGenerales(),f=$('bfEstado')?.value||'',q=norm($('bfQ')?.value||''); if(f)rows=rows.filter(b=>canonEstado((b.raw&&b.raw.estado)||'')===f); if(q)rows=rows.filter(b=>norm([b.identifier,b.display_name,recordWork(b),JSON.stringify(b.raw||{})].join(' ')).includes(q)); rows.sort((a,b)=>String((b.raw&&b.raw.fechaBaja)||'').localeCompare(String((a.raw&&a.raw.fechaBaja)||''))); $('bfRows').innerHTML=rows.map(b=>{const r=b.raw||{};return '<tr><td><b>'+esc(b.identifier||r.legajo||'')+'</b></td><td>'+esc(b.display_name||r.nombre||'')+'</td><td><span class="tag gray">Sistema completo</span></td><td>'+esc(r.movimiento||'BAJA GENERAL')+'</td><td>'+esc(r.fechaBaja||'')+'</td><td>'+pill(r.estado||'')+'</td><td><div class="icon-actions"><button class="icon-btn save" title="Reincorporar" data-reincorporar="'+esc(b.identifier||r.legajo||'')+'">♻️</button></div>'+actionButtons(b.id)+'</td></tr>'}).join('')||'<tr><td colspan="7" class="empty">Sin bajas cargadas.</td></tr>'}
async function saveBaja(){const p=state.records.find(x=>x.id===$('nbP').value); if(!p)return alert('Seleccioná un registro.'); const now=new Date().toISOString(); const raw={id:uid('baja'),tipoMovimiento:'baja_general',alcance:'general_sistema',legajo:p.identifier||'',nombre:p.display_name||'',fechaBaja:$('nbF').value,fechaMovimiento:now,tsMovimiento:now,estado:$('nbE').value,movimiento:$('nbM').value||'BAJA GENERAL',ultimaObra:recordWork(p),observaciones:$('nbO').value,historial:[{fecha:now,accion:'baja_general_creada',usuario:state.user&&state.user.name||'',estado:$('nbE').value}]}; const row={id:raw.id,bucket:'bajas',plant:'GENERAL',work:'GENERAL',identifier:p.identifier,display_name:p.display_name,company:p.company||'',docs:{},raw}; const res=await supa.from('alsi_records').insert(row).select().single(); if(res.error)return alert(res.error.message); state.records.push(res.data||row); closeModal(); renderBajas(); showSync('Baja general guardada en Supabase')}

function renderBajasPlanta(){$('pageTitle').textContent='Bajas de planta';$('pageSub').textContent='Filtra por obra desde el selector lateral'; let rows=allBajasPlanta(); const estados=['Pendiente','En trámite','Finalizada','Observada']; const counts={};estados.forEach(e=>counts[e]=0); rows.forEach(b=>{const e=(b.raw&&b.raw.estadoPlanta)||'Pendiente'; counts[e]=(counts[e]||0)+1}); $('view').innerHTML='<div class="final-grid">'+estados.map(e=>'<div class="final-card" data-bp="'+esc(e)+'"><div class="label">'+esc(e)+'</div><div class="num">'+(counts[e]||0)+'</div></div>').join('')+'</div><div class="panel"><div class="panel-head"><div><h3>Listado de bajas de planta</h3><p class="muted" style="margin:4px 0 0">Solo muestra bajas de planta. Si elegís una obra, filtra por esa obra.</p></div><div class="toolbar"><select id="bpEstado" class="input"><option value="">Todas</option>'+estados.map(e=>'<option>'+esc(e)+'</option>').join('')+'</select><input id="bpQ" class="input" style="width:220px" placeholder="Buscar..."><button class="btn primary" id="bpNew">➕ Nueva</button></div></div><div class="table-wrap"><table><thead><tr><th>Legajo</th><th>Nombre</th><th>Planta / Obra</th><th>Fecha</th><th>Motivo</th><th>Estado planta</th><th>Acciones</th></tr></thead><tbody id="bpRows"></tbody></table></div></div>'; $('bpEstado').addEventListener('change',drawBajasPlanta);$('bpQ').addEventListener('input',drawBajasPlanta);$('bpNew').addEventListener('click',newBajaPlanta);document.querySelectorAll('[data-bp]').forEach(c=>c.addEventListener('click',function(){$('bpEstado').value=this.dataset.bp;drawBajasPlanta()}));drawBajasPlanta()}
function drawBajasPlanta(){let rows=allBajasPlanta(),f=$('bpEstado')?.value||'',q=norm($('bpQ')?.value||''); if(f)rows=rows.filter(b=>((b.raw&&b.raw.estadoPlanta)||'Pendiente')===f); if(q)rows=rows.filter(b=>norm([b.identifier,b.display_name,bajaWork(b),JSON.stringify(b.raw||{})].join(' ')).includes(q)); rows.sort((a,b)=>String((b.raw&&b.raw.fechaBajaPlanta)||'').localeCompare(String((a.raw&&a.raw.fechaBajaPlanta)||''))); $('bpRows').innerHTML=rows.map(b=>{const r=b.raw||{};return '<tr><td><b>'+esc(b.identifier||r.legajo||'')+'</b></td><td>'+esc(b.display_name||r.nombre||'')+'</td><td>'+esc(bajaWork(b)||r.planta||r.obra||'')+'</td><td>'+esc(r.fechaBajaPlanta||r.fecha||'')+'</td><td>'+esc(r.motivoPlanta||r.motivo||'')+'</td><td><span class="status-pill gray">'+esc(r.estadoPlanta||'Pendiente')+'</span></td><td><div class="icon-actions"><button class="icon-btn save" title="Reincorporar" data-reincorporar="'+esc(b.identifier||r.legajo||'')+'">♻️</button></div>'+actionButtons(b.id)+'</td></tr>'}).join('')||'<tr><td colspan="7" class="empty">Sin bajas de planta cargadas para esta selección.</td></tr>'}
async function saveBajaPlanta(){const p=state.records.find(x=>x.id===$('bpP').value); if(!p)return alert('Seleccioná un registro.'); const w=recordWork(p); const raw={id:uid('baja_planta'),tipoMovimiento:'baja_planta',legajo:p.identifier||'',nombre:p.display_name||'',fechaBajaPlanta:$('bpF').value,estadoPlanta:$('bpE').value,motivoPlanta:$('bpM').value||'Baja solicitada por planta',planta:w,obra:w,ultimaObra:w,observaciones:$('bpO').value,historial:[{fecha:new Date().toISOString(),accion:'baja_planta_creada',usuario:state.user&&state.user.name||'',estado:$('bpE').value}]}; const row={id:raw.id,bucket:'bajas',plant:w,work:w,identifier:p.identifier,display_name:p.display_name,company:p.company||'',docs:{},raw}; const res=await supa.from('alsi_records').insert(row).select().single(); if(res.error)return alert(res.error.message); state.records.push(res.data||row); closeModal(); renderBajasPlanta(); showSync('Baja de planta guardada en Supabase')}
async function reincorporarLegajo(leg){if(!leg)return; if(!confirm('¿Reincorporar el legajo '+leg+' y habilitar nuevamente la carga documental?'))return; const base=state.records.find(r=>norm(legajoOf(r))===norm(leg)&&!isBajaGeneral(r)&&!isBajaPlanta(r)&&!isReincorporacion(r))||{}; const w=recordWork(base)||bajaWork(state.records.find(r=>norm(legajoOf(r))===norm(leg))||{}); const now=new Date().toISOString(); const raw={id:uid('reinc'),tipoMovimiento:'reincorporacion',alcance:'general_sistema',legajo:leg,nombre:base.display_name||'',fechaReincorporacion:todayStr(),fechaMovimiento:now,tsMovimiento:now,usuario:state.user&&state.user.name||'',observaciones:'Reincorporación general desde Bajas',historial:[{fecha:now,accion:'reincorporacion_general',usuario:state.user&&state.user.name||''}]}; const row={id:raw.id,bucket:'bajas',plant:'GENERAL',work:'GENERAL',identifier:leg,display_name:base.display_name||'',company:base.company||'',docs:{},raw}; const res=await supa.from('alsi_records').insert(row).select().single(); if(res.error)return alert(res.error.message); state.records.push(res.data||row); closeModal(); await refresh(true); render(); showSync('Personal reincorporado en Supabase')}
document.addEventListener('click',function(e){const reinc=e.target.closest('[data-reincorporar]'); if(reinc)return reincorporarLegajo(reinc.dataset.reincorporar); const open=e.target.closest('[data-open]'); if(open)return openRecord(open.dataset.open); const del=e.target.closest('[data-delete]'); if(del)return deleteRecord(del.dataset.delete); const nw=e.target.closest('[data-new]'); if(nw)return newRecord(nw.dataset.new); const calOpen=e.target.closest('[data-cal-open]'); if(calOpen)return openCalendarRecord(calOpen.dataset.calOpen,calOpen.dataset.calBucket,calOpen.dataset.calWork,calOpen.dataset.calReq); const cal=e.target.closest('[data-cal]'); if(cal)return openCalDay(cal.dataset.cal)});
document.addEventListener('DOMContentLoaded',function(){ $('loginBtn').addEventListener('click',login);$('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')login()});$('logoutBtn').addEventListener('click',()=>{location.reload()});$('closeModalBtn').addEventListener('click',closeModal);$('workFilter').addEventListener('change',render);$('syncCurrentViewBtn').addEventListener('click',()=>refresh());$('calendarToggle').addEventListener('click',()=>{$('calendar')?.classList.toggle('open')});document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>setView(b.dataset.view))); document.addEventListener('keydown',e=>{const isRefresh=e.key==='F5'||((e.ctrlKey||e.metaKey)&&String(e.key).toLowerCase()==='r'); if(isRefresh&&state.loaded){e.preventDefault();refresh()}})});
})();

<script>
/* ===== ALSI REV21 - Activadores visuales seguros SUAVES ===== */
(function(){
  'use strict';
  function markSelectedRow(ev){
    const tr=ev.target.closest&&ev.target.closest('tbody tr');
    if(!tr || tr.querySelector('.empty')) return;
    const tbody=tr.parentElement;
    if(tbody) tbody.querySelectorAll('tr.alsi-row-selected').forEach(r=>r.classList.remove('alsi-row-selected'));
    tr.classList.add('alsi-row-selected');
  }
  function animateViewOnce(){
    const view=document.getElementById('view');
    if(!view) return;
    view.classList.remove('view-switching');
    void view.offsetWidth;
    view.classList.add('view-switching');
    window.setTimeout(()=>view.classList.remove('view-switching'),150);
  }
  document.addEventListener('click',markSelectedRow,true);
  document.addEventListener('click',function(ev){
    if(ev.target.closest&&ev.target.closest('.nav-btn')) window.setTimeout(animateViewOnce,35);
  },true);
})();
</script>
